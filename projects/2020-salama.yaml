architectural_context: "The project involved co-developing a web gateway for Salama Cooperative Insurance Company to manage and automate high-volume car insurance registrations in Saudi Arabia. It served as the architectural blueprint for validation workflows adopted across subsequent KSA public sector portals, emphasizing compliance-driven design and scalable data models."
