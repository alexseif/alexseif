architectural_context: "Served as Software Architect and NGO Technical Partner, designing an e-commerce engine and backend data synchronization pipeline for Bouri Center. The architecture integrated a web-facing retail catalog with an existing corporate ERP legacy system serving a multi-location brick-and-mortar retail chain. To manage third-party system constraints, the platform decoupled the e-commerce storage layer from the live ERP nodes, structuring the web application database to function as an isolated physical store branch node."
