architectural_context: "Retained as Software Architect and NGO Technical Partner to oversee, optimize, and maintain the digital publishing infrastructure for Ajel.sa, a major news agency in the Kingdom of Saudi Arabia. The engineering mandate required managing a multi-server Drupal enterprise environment hosted on Acquia Cloud, tuned to achieve low-latency edge rendering and maintain performance during high-concurrency regional breaking news traffic spikes."
