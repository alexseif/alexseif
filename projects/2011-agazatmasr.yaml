architectural_context: "Served as Software Architect and NGO Technical Partner, co-engineering a digital brochure and asynchronous transaction management system. The platform supported the client in scaling its domestic tourism offerings in Egypt. The architecture addressed multi-tier inventory aggregation challenges by combining dynamic packages, excursions, and transport transfers into a relational lookup model, maintaining performance under regular traffic loads."
