architectural_context: "Served as Software Architect and NGO Technical Partner, designing and implementing a specialized, interactive B2C e-commerce platform for Arts-Mart. The implementation supported complex, multi-layered frontend asset customization. The system was split into a custom background data layout and a rendering engine that allowed end-users to dynamically customize product frameworks and visualize them in simulated environments."
