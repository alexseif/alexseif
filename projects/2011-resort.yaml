architectural_context: "Retained as Software Architect and NGO Technical Partner to design and maintain a multi-tenant property rental and resort management engine. The platform reconciled conflicting operational demands: open public guest bookings, direct private property owner occupancy, legal constraints, and physical estate maintenance tracking. By translating property rental contracts into validation logic, the engine enforced booking boundaries and prevented cross-channel double-booking race conditions at the database layer."
